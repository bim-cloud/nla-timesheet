<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NLA Timesheet</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%226%22 fill=%22%23102347%22/><text y=%2224%22 x=%224%22 font-size=%2222%22 fill=%22white%22>N</text></svg>"/>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1d21}#root{min-height:100vh}
/* Nature Landscape Architects   Timesheet Dashboard */

:root {
  --brand-navy: #102347;
  --brand-navy-700: #1a3260;
  --brand-navy-600: #24437e;
  --brand-navy-500: #2f559b;
  --brand-navy-50: #eef2f9;
  --brand-navy-100: #dde5f0;

  --accent: var(--brand-navy);

  --bg: #f7f8fb;
  --surface: #ffffff;
  --surface-muted: #fafbfd;
  --border: #e6e9ef;
  --border-strong: #d5dae3;

  --text: #0f1728;
  --text-muted: #525c6f;
  --text-faint: #8a93a4;

  --success: oklch(0.62 0.11 155);
  --success-bg: oklch(0.96 0.03 155);
  --warning: oklch(0.7 0.14 72);
  --warning-bg: oklch(0.97 0.04 85);
  --danger: oklch(0.58 0.17 25);
  --danger-bg: oklch(0.97 0.03 25);

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;

  --shadow-xs: 0 1px 2px rgba(16, 35, 71, 0.04);
  --shadow-sm: 0 1px 3px rgba(16, 35, 71, 0.06), 0 1px 2px rgba(16, 35, 71, 0.04);
  --shadow-md: 0 4px 12px rgba(16, 35, 71, 0.06), 0 2px 4px rgba(16, 35, 71, 0.04);
  --shadow-lg: 0 12px 32px rgba(16, 35, 71, 0.12);

  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv11", "ss01";
}

button { font-family: inherit; }

.app {
  display: grid;
  grid-template-columns: 248px 1fr;
  min-height: 100vh;
}

/*     Sidebar     */
.sidebar {
  background: var(--brand-navy);
  color: #c9d3e6;
  padding: 22px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: sticky;
  top: 0;
  height: 100vh;
}

.sidebar-logo {
  padding: 6px 8px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-logo img {
  height: 42px;
  width: auto;
  display: block;
}

.sidebar-section-label {
  font-size: 10.5px;
  letter-spacing: 0.12em;
  font-weight: 600;
  color: #8a9bbd;
  padding: 18px 12px 8px;
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: #c9d3e6;
  cursor: pointer;
  border: 0;
  background: transparent;
  text-align: left;
  width: 100%;
  transition: background 0.12s, color 0.12s;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.nav-item .nav-count {
  margin-left: auto;
  background: rgba(255,255,255,0.12);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 999px;
}

.sidebar-user {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--brand-navy-500);
  color: #fff;
  font-weight: 600;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sidebar-user .who { font-size: 13px; color: #fff; font-weight: 500; }
.sidebar-user .role { font-size: 11.5px; color: #8a9bbd; }

/*     Main     */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}
.topbar .subtitle {
  color: var(--text-muted);
  font-size: 13.5px;
  margin-left: 2px;
}
.topbar .spacer { flex: 1; }

.view-switch {
  display: inline-flex;
  background: var(--surface-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
}
.view-switch button {
  border: 0;
  background: transparent;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
}
.view-switch button.on {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-xs);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: all 0.12s;
}
.btn:hover { border-color: var(--border-strong); background: var(--surface-muted); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--surface-muted); }
.btn-danger {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}
.btn-sm { padding: 5px 10px; font-size: 12px; }

.content {
  padding: 28px 32px 64px;
  max-width: 1280px;
  width: 100%;
}

/*     Cards     */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-xs);
}
.card-pad { padding: 20px 22px; }
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.005em;
}
.card-sub { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }

/*     Clock Card     */
.clock-card {
  background: linear-gradient(135deg, var(--brand-navy) 0%, var(--brand-navy-700) 100%);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 26px 28px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.clock-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.clock-card::after {
  content: '';
  position: absolute;
  bottom: -60px; right: 60px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(255,255,255,0.025);
}
.clock-label {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8ea4cc;
  font-weight: 600;
  margin-bottom: 6px;
}
.clock-time {
  font-family: var(--font-mono);
  font-size: 52px;
  font-weight: 500;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.clock-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  font-size: 13.5px;
  color: #c9d3e6;
}
.clock-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #7ed984;
  box-shadow: 0 0 0 4px rgba(126, 217, 132, 0.2);
}
.clock-dot.off { background: #8a93a4; box-shadow: 0 0 0 4px rgba(138, 147, 164, 0.15); }

.clock-actions { display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 2; }

.clock-btn {
  padding: 12px 28px;
  border-radius: 10px;
  border: 0;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 170px;
  justify-content: center;
}
.clock-btn.start {
  background: #fff;
  color: var(--brand-navy);
}
.clock-btn.stop {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}
.clock-btn.break {
  background: transparent;
  color: #c9d3e6;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px 20px;
  font-weight: 500;
}
.clock-btn:hover { filter: brightness(0.96); }

/*     Stat cards     */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}
.stat {
  padding: 16px 18px;
}
.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 6px;
}
.stat-value {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}
.stat-value .unit {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 2px;
  font-family: var(--font-sans);
}
.stat-delta {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.stat-delta.up { color: var(--success); }
.stat-delta.down { color: var(--danger); }

/*     Today entries table     */
.entries {
  display: flex;
  flex-direction: column;
}
.entry-row {
  display: grid;
  grid-template-columns: 40px 1fr 160px 100px 90px 32px;
  align-items: center;
  gap: 14px;
  padding: 12px 22px;
  border-top: 1px solid var(--border);
  transition: background 0.1s;
}
.entry-row:first-child { border-top: 0; }
.entry-row:hover { background: var(--surface-muted); }
.entry-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--brand-navy-50);
  color: var(--brand-navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-weight: 600;
}
.entry-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin: 0 0 2px 0;
}
.entry-notes {
  font-size: 12.5px;
  color: var(--text-muted);
  margin: 0;
}
.entry-project {
  font-size: 12.5px;
  color: var(--text-muted);
}
.entry-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 5px;
  background: var(--brand-navy-50);
  color: var(--brand-navy-600);
}
.entry-tag.design { background: oklch(0.95 0.04 240); color: oklch(0.45 0.14 260); }
.entry-tag.meeting { background: oklch(0.96 0.04 60); color: oklch(0.5 0.14 60); }
.entry-tag.review { background: oklch(0.95 0.04 155); color: oklch(0.45 0.12 155); }

.entry-hours {
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.entry-menu {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 0;
  background: transparent;
  color: var(--text-faint);
  cursor: pointer;
}
.entry-menu:hover { background: var(--surface-muted); color: var(--text); }

.entries-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  background: var(--surface-muted);
  border-radius: 0 0 var(--radius) var(--radius);
  font-size: 13px;
}
.entries-footer .total {
  font-family: var(--font-mono);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/*     Add entry form     */
.add-entry {
  padding: 16px 22px;
  border-top: 1px dashed var(--border);
  background: var(--surface-muted);
  display: grid;
  grid-template-columns: 2fr 1.3fr 0.7fr auto;
  gap: 10px;
  align-items: center;
}
.input, .select, .textarea {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 13.5px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  width: 100%;
}
.input:focus, .select:focus, .textarea:focus {
  outline: 2px solid var(--brand-navy-100);
  border-color: var(--brand-navy-500);
}
.input::placeholder { color: var(--text-faint); }

/*     Weekly grid     */
.week-grid {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.week-grid th {
  text-align: left;
  font-weight: 500;
  color: var(--text-muted);
  padding: 12px 14px;
  font-size: 12px;
  letter-spacing: 0.02em;
  border-bottom: 1px solid var(--border);
  background: var(--surface-muted);
}
.week-grid th.day-col {
  text-align: center;
  min-width: 72px;
}
.week-grid th.total-col {
  text-align: right;
  width: 90px;
}
.week-grid td {
  padding: 0;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.week-grid tr:last-child td { border-bottom: 0; }

.week-project {
  padding: 14px;
  font-size: 13px;
  font-weight: 500;
}
.week-project .proj-sub {
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 2px;
}

.week-cell {
  text-align: center;
  padding: 8px;
}
.week-cell input {
  width: 56px;
  border: 0;
  background: transparent;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-variant-numeric: tabular-nums;
  padding: 7px 4px;
  border-radius: 6px;
  color: var(--text);
}
.week-cell input:hover { background: var(--surface-muted); }
.week-cell input:focus {
  outline: 2px solid var(--brand-navy-100);
  background: var(--surface);
}
.week-cell.weekend { background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(0,0,0,0.015) 6px, rgba(0,0,0,0.015) 12px); }
.today-col { background: rgba(16,35,71,0.04) !important; }
th.today-col { background: rgba(16,35,71,0.08) !important; font-weight: 700; color: var(--accent) !important; }
.week-cell input:disabled { opacity: 0.6; cursor: not-allowed; background: transparent; }
.week-cell.has-value input { font-weight: 500; }
.week-cell.empty input { color: var(--text-faint); }

.week-total {
  padding: 14px;
  font-family: var(--font-mono);
  font-weight: 600;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.week-total-row td {
  background: var(--surface-muted);
  font-weight: 600;
  padding: 12px 14px !important;
}
.week-total-row .week-project { color: var(--text); }

/*     Manager table     */
.team-table {
  width: 100%;
  border-collapse: collapse;
}
.team-table { table-layout: auto; }
.team-table th {
  text-align: left;
  font-weight: 500;
  color: var(--text-muted);
  padding: 12px 16px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-muted);
  white-space: nowrap;
}
.team-table th.num { text-align: right; }
.team-table td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13.5px;
  vertical-align: middle;
}
.team-table .util-bar { width: 110px; }
.team-table tr:last-child td { border-bottom: 0; }
.team-table tr:hover td { background: var(--surface-muted); }
.team-table td.num {
  text-align: right;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}
.team-cell-emp {
  display: flex;
  align-items: center;
  gap: 12px;
}
.team-cell-emp .avatar { width: 32px; height: 32px; font-size: 12px; }
.team-cell-emp .name { font-weight: 500; }
.team-cell-emp .role { font-size: 11.5px; color: var(--text-muted); }

/*     Utilization bar     */
.util-bar {
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
  width: 140px;
  display: inline-block;
  vertical-align: middle;
}
.util-bar > span {
  display: block;
  height: 100%;
  background: var(--brand-navy);
  border-radius: 99px;
  transition: width 0.3s;
}
.util-bar.over > span { background: var(--warning); }

/*     Badges     */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--surface-muted);
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.badge.success { background: var(--success-bg); color: var(--success); border-color: transparent; }
.badge.warning { background: var(--warning-bg); color: oklch(0.48 0.14 72); border-color: transparent; }
.badge.danger { background: var(--danger-bg); color: var(--danger); border-color: transparent; }
.badge.info { background: var(--brand-navy-50); color: var(--brand-navy-600); border-color: transparent; }
.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/*     Two-column grid     */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.col-8-4 {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
  gap: 18px;
}
.col-stack {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
}

/*     Project progress     */
.project-item {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 200px 100px;
  gap: 18px;
  align-items: center;
}
.project-item:first-of-type { border-top: 0; }
.project-item .pname { font-size: 13.5px; font-weight: 500; }
.project-item .pmeta { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
.project-item .phours {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  text-align: right;
}

/*     Approval requests     */
.request {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
}
.request:first-of-type { border-top: 0; }
.request .req-body { flex: 1; min-width: 0; }
.request .req-title { font-size: 13.5px; font-weight: 500; margin: 0 0 2px; }
.request .req-sub { font-size: 12px; color: var(--text-muted); margin: 0; }
.request .req-actions { display: flex; gap: 6px; }

/*     Section heading     */
.section-title {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin: 28px 0 12px;
}
.section-title h2 {
  font-size: 15px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.005em;
}
.section-title .hint {
  font-size: 12.5px;
  color: var(--text-muted);
}

/*     Tweaks panel     */
.tweaks-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 280px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  z-index: 100;
  font-size: 13px;
}
.tweaks-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 13.5px;
}
.tweaks-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 16px; }
.tweak-row { display: flex; flex-direction: column; gap: 8px; }
.tweak-row label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.tweak-swatches { display: flex; gap: 6px; }
.tweak-swatch {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s;
}
.tweak-swatch:hover { transform: scale(1.1); }
.tweak-swatch.on { border-color: var(--text); }
.tweak-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
}
.switch {
  position: relative;
  width: 32px;
  height: 18px;
  background: var(--border-strong);
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.15s;
}
.switch.on { background: var(--accent); }
.switch::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.switch.on::after { transform: translateX(14px); }

/*     Leave requests     */
.leave-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 16px 22px;
}
.leave-stat {
  padding: 14px;
  background: var(--surface-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.leave-stat .n {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.leave-stat .l { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }

/*     Mini sparkline-ish bars     */
.day-bars {
  display: flex;
  align-items: stretch;
  gap: 8px;
  height: 140px;
  padding: 22px 22px 18px;
}
.day-bar {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  height: 100%;
}
.day-bar .bar {
  width: 100%;
  flex: 1;
  background: var(--brand-navy-100);
  border-radius: 4px 4px 0 0;
  position: relative;
  overflow: hidden;
  min-height: 4px;
}
.day-bar .bar .fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--brand-navy);
  border-radius: 4px 4px 0 0;
}
.day-bar .label {
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/*     Icons (pure CSS/SVG inline via font weight)     */
.icon {
  width: 16px; height: 16px;
  display: inline-block;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/*     Empty states     */
.empty {
  padding: 40px 22px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}

/* print / pdf trigger */
@media print {
  .sidebar, .topbar, .tweaks-panel { display: none; }
  .content { padding: 0; }
}

/* Modal overrides */
.modal-card {
  background: var(--surface, #fff) !important;
  border-radius: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  overflow: hidden;
}
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(16,35,71,0.55);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  z-index: 500;
  padding: 20px;
}

/* Login screen + auth styles */

.login-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg);
}

.login-panel {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
  background: var(--surface);
}

.login-card {
  width: 100%;
  max-width: 380px;
}

.login-card .brand {
  margin-bottom: 40px;
}
.login-card .brand img { height: 44px; display: block; }

.login-card h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0 0 6px;
}
.login-card .sub {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 28px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}
.field label {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
}
.field .hint-link {
  font-size: 12px;
  color: var(--brand-navy-600);
  cursor: pointer;
  text-decoration: none;
}
.field .hint-link:hover { text-decoration: underline; }
.field-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.login-btn {
  width: 100%;
  padding: 11px 14px;
  background: var(--brand-navy);
  color: #fff;
  border: 0;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
.login-btn:hover { filter: brightness(1.1); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.login-error {
  background: var(--danger-bg);
  color: var(--danger);
  padding: 10px 12px;
  border-radius: 7px;
  font-size: 13px;
  margin-bottom: 14px;
}
.login-success {
  background: var(--success-bg);
  color: var(--success);
  padding: 10px 12px;
  border-radius: 7px;
  font-size: 13px;
  margin-bottom: 14px;
}

.login-hero {
  background: linear-gradient(135deg, var(--brand-navy) 0%, var(--brand-navy-700) 100%);
  color: #fff;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.login-hero::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 360px; height: 360px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.login-hero::after {
  content: '';
  position: absolute;
  bottom: -120px; left: -80px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.login-hero .hero-kicker {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #8ea4cc;
  font-weight: 600;
  position: relative;
}
.login-hero h2 {
  font-size: 36px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  font-weight: 600;
  margin: 16px 0 18px;
  position: relative;
  max-width: 480px;
}
.login-hero p {
  font-size: 15px;
  color: #c9d3e6;
  line-height: 1.55;
  max-width: 440px;
  position: relative;
}
.login-hero-footer {
  font-size: 12px;
  color: #8ea4cc;
  position: relative;
}


/*     User menu dropdown in topbar     */
.user-menu {
  position: relative;
}
.user-menu-trigger {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 10px 5px 5px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  cursor: pointer;
  font-family: inherit;
}
.user-menu-trigger:hover { background: var(--surface-muted); }
.user-menu-trigger .avatar { width: 28px; height: 28px; font-size: 11px; }
.user-menu-trigger .name { font-size: 13px; font-weight: 500; }

.user-menu-pop {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  min-width: 240px;
  padding: 6px;
  z-index: 200;
}
.user-menu-pop .who-block {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.user-menu-pop .who-block .n { font-size: 13.5px; font-weight: 600; }
.user-menu-pop .who-block .e { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.user-menu-pop button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 8px 12px;
  border: 0;
  background: transparent;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
}
.user-menu-pop button:hover { background: var(--surface-muted); }
.user-menu-pop button.danger { color: var(--danger); }

/*     Activity indicator (idle / active)     */
.activity-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px 4px 8px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: rgba(255,255,255,0.1);
  color: #c9d3e6;
  border: 1px solid rgba(255,255,255,0.12);
}
.activity-pill .pulse {
  width: 7px; height: 7px; border-radius: 50%;
  background: #7ed984;
  box-shadow: 0 0 0 3px rgba(126, 217, 132, 0.25);
  animation: pulse 2s ease-in-out infinite;
}
.activity-pill.idle .pulse {
  background: #f5bf60;
  box-shadow: 0 0 0 3px rgba(245, 191, 96, 0.25);
  animation: none;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}

.activity-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
  position: relative;
  z-index: 2;
}
.activity-cell .l {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #8ea4cc;
  font-weight: 600;
  margin-bottom: 4px;
}
.activity-cell .v {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  color: #fff;
}
.activity-cell .sv {
  font-size: 11.5px;
  color: #8ea4cc;
  margin-top: 2px;
}

/* Shared bb-dot palette (used by manager app-usage card) */
.bb-dot {
  display: inline-block;
  width: 10px; height: 10px; border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}
.bb-dot.bb-revit    { background: #3fb6e6; }
.bb-dot.bb-acad     { background: #e8554e; }
.bb-dot.bb-sketch   { background: #f9a03f; }
.bb-dot.bb-teams    { background: #6c7dd5; }
.bb-dot.bb-outlook  { background: #4a90d9; }
.bb-dot.bb-pdf      { background: #9a6fe0; }
.bb-dot.bb-other    { background: #c4cbd6; }

/* Application usage breakdown (manager view) */
.app-usage-key {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 18px;
  padding: 10px 16px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
}
.app-usage-key span { display: inline-flex; align-items: center; }
.app-usage-key .muted { color: #a0a8b3; font-style: italic; }

.app-usage-list { padding: 4px 0; }
.app-usage-row {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 20px;
  align-items: center;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}
.app-usage-row:first-child { border-top: none; }
.au-who { display: flex; align-items: center; gap: 10px; min-width: 0; }
.au-name { font-weight: 600; font-size: 13.5px; color: var(--text); }
.au-sub  { font-size: 11.5px; color: var(--text-muted); }
.au-bar-col { min-width: 0; }
.au-totals {
  display: flex; gap: 6px; align-items: baseline;
  font-size: 12px; margin-bottom: 6px;
}
.au-billable { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.au-other    { color: var(--text-muted); font-variant-numeric: tabular-nums; }
.au-bar {
  display: flex; height: 10px;
  border-radius: 5px; overflow: hidden;
  background: #eef1f5;
}
.au-seg { height: 100%; }
.au-seg.bb-revit    { background: #3fb6e6; }
.au-seg.bb-acad     { background: #e8554e; }
.au-seg.bb-sketch   { background: #f9a03f; }
.au-seg.bb-teams    { background: #6c7dd5; }
.au-seg.bb-outlook  { background: #4a90d9; }
.au-seg.bb-pdf      { background: #9a6fe0; }
.au-seg.bb-other    { background: #d5dae2; }
.au-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 8px;
}
.au-chip {
  display: inline-flex; align-items: center;
  font-size: 11.5px;
  padding: 3px 8px 3px 6px;
  background: #f4f6fa;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.au-chip.muted { color: var(--text-muted); font-style: italic; }
.avatar.sm { width: 32px; height: 32px; font-size: 11px; }

/* Billable app breakdown (allow-list tracking) */
.billable-breakdown {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
  position: relative;
  z-index: 2;
}
.bb-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.bb-title {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #8ea4cc;
  font-weight: 600;
}
.bb-note {
  font-size: 11px;
  color: #7a8cab;
  font-style: italic;
}
.bb-bar {
  display: flex;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  background: rgba(255,255,255,0.06);
  margin-bottom: 12px;
}
.bb-seg { height: 100%; }
.bb-seg.bb-revit    { background: #3fb6e6; }
.bb-seg.bb-acad     { background: #e8554e; }
.bb-seg.bb-sketch   { background: #f9a03f; }
.bb-seg.bb-teams    { background: #6c7dd5; }
.bb-seg.bb-outlook  { background: #4a90d9; }
.bb-seg.bb-pdf      { background: #9a6fe0; }
.bb-seg.bb-other    { background: rgba(255,255,255,0.12); }

.bb-legend {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px 18px;
}
.bb-app {
  display: grid;
  grid-template-columns: 10px 1fr auto;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #c9d3e6;
}
.bb-app.bb-excluded { color: #7a8cab; opacity: 0.85; grid-column: 1 / -1; margin-top: 4px; padding-top: 6px; border-top: 1px dashed rgba(255,255,255,0.08); }
.bb-dot {
  width: 10px; height: 10px; border-radius: 2px;
}
.bb-dot.bb-revit    { background: #3fb6e6; }
.bb-dot.bb-acad     { background: #e8554e; }
.bb-dot.bb-sketch   { background: #f9a03f; }
.bb-dot.bb-teams    { background: #6c7dd5; }
.bb-dot.bb-outlook  { background: #4a90d9; }
.bb-dot.bb-pdf      { background: #9a6fe0; }
.bb-dot.bb-other    { background: rgba(255,255,255,0.2); }
.bb-name { font-weight: 500; }
.bb-hrs {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  color: #e8eef8;
}
.bb-excluded .bb-hrs { color: #7a8cab; font-style: italic; }

/* Idle modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(16,35,71,0.5);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  z-index: 500;
}
.modal {
  background: var(--surface);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  width: 440px;
  max-width: 90vw;
  overflow: hidden;
}
.modal-header {
  padding: 22px 24px 4px;
}
.modal-header h3 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
.modal-header p { margin: 6px 0 0; color: var(--text-muted); font-size: 13.5px; line-height: 1.5; }
.modal-body { padding: 18px 24px 4px; }
.modal-footer {
  padding: 16px 24px 20px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/*     Users management (admin)     */
.users-table { width: 100%; border-collapse: collapse; }
.users-table th, .users-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  text-align: left;
  vertical-align: middle;
}
.users-table th:first-child,
.users-table td:first-child { padding-left: 22px; }
.users-table th:last-child,
.users-table td:last-child { padding-right: 22px; }
.users-table th {
  background: var(--surface-muted);
  color: var(--text-muted);
  font-weight: 500;
  font-size: 12px;
}
.users-table tr:last-child td { border-bottom: 0; }
.users-table code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--surface-muted);
  padding: 2px 6px;
  border-radius: 4px;
}


/* =========================================================
   Time breakdown by application   professional table card
   ========================================================= */
.tb-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.tb-header {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.tb-header-l { flex: 1; min-width: 0; }
.tb-title {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.tb-sub {
  margin-top: 3px;
  font-size: 12px;
  color: var(--text-muted);
}
.tb-range {
  display: inline-flex;
  background: var(--surface-muted);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 2px;
}
.tb-range-btn {
  border: 0;
  background: transparent;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
}
.tb-range-btn.on {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
}

.tb-util-pill {
  display: inline-block;
  min-width: 44px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  text-align: center;
}
.tb-util-pill.good { background: #e4f5ec; color: #16794c; }
.tb-util-pill.ok   { background: #fff3db; color: #92620d; }
.tb-util-pill.low  { background: #fde8e6; color: #a52822; }



/* =========================================================
   AppUsage   donut + legend split (Activity Monitor style)
   ========================================================= */
.au-split {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  padding: 18px 22px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
@media (max-width: 900px) { .au-split { grid-template-columns: 1fr; } }

.au-donut { display: flex; justify-content: center; }
.au-donut-svg {
  width: 180px; height: 180px;
  overflow: visible;
}
.au-donut-svg .au-donut-slice {
  transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), filter 0.2s, opacity 0.2s;
  transform-origin: 75px 75px;
  cursor: pointer;
  opacity: 0;
  animation: au-slice-in 0.55s ease-out forwards;
}
.au-donut-svg.mounted .au-donut-slice { opacity: 1; }
@keyframes au-slice-in {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}
.au-donut-v {
  font-size: 22px; font-weight: 600; fill: var(--text);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  font-family: var(--font-mono);
}
.au-donut-l {
  font-size: 8.5px; fill: var(--text-muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  font-weight: 600;
}

.au-split-title {
  font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); font-weight: 600;
  margin-bottom: 10px;
}
.au-split-rows { display: flex; flex-direction: column; gap: 7px; }
.au-split-row {
  display: grid;
  grid-template-columns: 14px minmax(120px, 1fr) 2fr 60px 44px;
  align-items: center;
  gap: 10px;
  font-size: 12.5px;
  color: var(--text);
}
.au-split-row .bb-dot { width: 10px; height: 10px; border-radius: 2px; margin: 0; }
.au-split-name {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.au-split-bar {
  height: 6px;
  background: #eef1f5;
  border-radius: 3px;
  overflow: hidden;
}
.au-split-bar > div {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.au-split-hrs, .au-split-pct {
  font-variant-numeric: tabular-nums;
  text-align: right;
  color: var(--text-muted);
  font-size: 11.5px;
}
.au-split-hrs { color: var(--text); font-weight: 500; }
.au-split-foot {
  margin-top: 14px;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
}

/* Row variants used in this card */
.am-row-head {
  grid-template-columns: minmax(240px, 2fr) 240px minmax(220px, 3fr) 110px 70px !important;

// Loaded before all other JSX files in index.html

const SUPABASE_URL = 'https://tddegqxozgdnottitzeq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_svk_tc3SIHy7e5yL2n3gYA_cH9yTvPg';

// -- Profile helpers -------------------------------------------

const SupaProfiles = {
  // Upsert profile when user logs in
  async upsert(user) {
    const {
      error
    } = await sb.from('profiles').upsert({
      id: user.id,
      username: user.username,
      name: user.name,
      role: user.role,
      user_type: user.type,
      initials: user.initials,
      tz: user.tz || 'Asia/Dubai',
      tz_label: user.tzLabel || 'UAE'
    }, {
      onConflict: 'id'
    });
    if (error) console.warn('Profile upsert error:', error.message);
  },
  async getAll() {
    const {
      data,
      error
    } = await sb.from('profiles').select('*').order('name');
    if (error) {
      console.warn('Profiles fetch error:', error.message);
      return [];
    }
    return data || [];
  }
};

// -- Entry helpers ---------------------------------------------

const SupaEntries = {
  // Load entries for a user on a given date (YYYY-MM-DD)
  async forDay(userId, date) {
    const {
      data,
      error
    } = await sb.from('entries').select('*').eq('user_id', userId).eq('date', date).order('created_at');
    if (error) {
      console.warn('Entries fetch error:', error.message);
      return [];
    }
    return data || [];
  },
  // Load all entries for a date (manager view)
  async teamForDay(date) {
    const {
      data,
      error
    } = await sb.from('entries').select('*, profiles(name, role, initials, user_type)').eq('date', date).order('created_at');
    if (error) {
      console.warn('Team entries fetch error:', error.message);
      return [];
    }
    return data || [];
  },
  // Load this week's entries for a user
  async forWeek(userId, mondayDate) {
    const friday = new Date(mondayDate);
    friday.setDate(friday.getDate() + 4);
    const {
      data,
      error
    } = await sb.from('entries').select('*').eq('user_id', userId).gte('date', mondayDate).lte('date', friday.toISOString().split('T')[0]).order('date');
    if (error) {
      console.warn('Week entries fetch error:', error.message);
      return [];
    }
    return data || [];
  },
  // Insert a new entry
  async add(userId, entry) {
    const today = new Date().toISOString().split('T')[0];
    const {
      data,
      error
    } = await sb.from('entries').insert({
      user_id: userId,
      date: today,
      project_id: entry.project,
      project_name: (window.DATA?.PROJECTS || []).find(p => p.id === entry.project)?.name || entry.project,
      task_type: entry.type,
      title: entry.title,
      notes: entry.notes || '',
      hours: entry.hours,
      status: 'draft'
    }).select().single();
    if (error) {
      console.warn('Entry insert error:', error.message);
      return null;
    }
    return data;
  },
  // Delete an entry
  async remove(entryId) {
    const {
      error
    } = await sb.from('entries').delete().eq('id', entryId);
    if (error) console.warn('Entry delete error:', error.message);
  },
  // Submit a day's entries (change status to 'submitted')
  async submitDay(userId, date) {
    const {
      error
    } = await sb.from('entries').update({
      status: 'submitted'
    }).eq('user_id', userId).eq('date', date);
    if (error) console.warn('Submit error:', error.message);
  },
  // Load all entries for a week grouped by project+day (for weekly grid)
  async forWeekGrid(userId, mondayDate) {
    const friday = new Date(mondayDate);
    friday.setDate(friday.getDate() + 4);
    const {
      data,
      error
    } = await sb.from('entries').select('*').eq('user_id', userId).gte('date', mondayDate).lte('date', friday.toISOString().split('T')[0]).order('created_at');
    if (error) {
      console.warn('Week grid fetch error:', error.message);
      return [];
    }
    return data || [];
  },
  // Upsert a grid cell   finds existing grid entry for project+date and updates, or inserts
  async upsertGridCell(userId, projectId, projectName, date, hours) {
    // Find existing grid entry for this project+date
    const {
      data: existing
    } = await sb.from('entries').select('id').eq('user_id', userId).eq('date', date).eq('project_id', projectId).eq('task_type', 'grid').maybeSingle();
    if (hours <= 0) {
      // Delete if exists
      if (existing?.id) {
        await sb.from('entries').delete().eq('id', existing.id);
      }
      return;
    }
    if (existing?.id) {
      // Update
      await sb.from('entries').update({
        hours,
        title: `Weekly timesheet   ${projectName}`
      }).eq('id', existing.id);
    } else {
      // Insert
      await sb.from('entries').insert({
        user_id: userId,
        date,
        project_id: projectId,
        project_name: projectName,
        task_type: 'grid',
        title: `Weekly timesheet   ${projectName}`,
        notes: '',
        hours,
        status: 'draft'
      });
    }
  },
  // Submit all entries for a week + trigger email notification
  async submitWeek(userId, mondayDate, notifyPayload) {
    const friday = new Date(mondayDate);
    friday.setDate(friday.getDate() + 4);
    const {
      error
    } = await sb.from('entries').update({
      status: 'submitted'
    }).eq('user_id', userId).gte('date', mondayDate).lte('date', friday.toISOString().split('T')[0]);
    if (error) {
      console.warn('Submit week error:', error.message);
      return false;
    }

    // Fire email notification (non-blocking   don't fail submission if email fails)
    if (notifyPayload) {
      try {
        await sb.functions.invoke('notify-submission', {
          body: notifyPayload
        });
      } catch (e) {
        console.warn('Email notification failed (non-critical):', e.message);
      }
    }
    return true;
  },
  // Get all submitted (pending) timesheets for manager approval
  async getPendingSubmissions() {
    const {
      data,
      error
    } = await sb.from('entries').select('*, profiles(name, role, initials)').eq('status', 'submitted').order('created_at', {
      ascending: false
    });
    if (error) {
      console.warn('Pending fetch error:', error.message);
      return [];
    }
    return data || [];
  },
  // Approve a list of entry IDs
  async approveSubmission(entryIds, employeeId, weekLabel) {
    const {
      error
    } = await sb.from('entries').update({
      status: 'approved'
    }).in('id', entryIds);
    if (error) {
      console.warn('Approve error:', error.message);
      return false;
    }
    // Notify employee
    if (employeeId) {
      await sb.from('notifications').insert({
        user_id: employeeId,
        type: 'approved',
        title: 'Timesheet approved',
        message: weekLabel ? `Your timesheet for ${weekLabel} has been approved.` : 'Your timesheet has been approved.'
      });
    }
    return true;
  },
  // Reject a list of entry IDs (set back to draft so employee can resubmit)
  async rejectSubmission(entryIds, employeeId, weekLabel) {
    const {
      error
    } = await sb.from('entries').update({
      status: 'draft'
    }).in('id', entryIds);
    if (error) {
      console.warn('Reject error:', error.message);
      return false;
    }
    // Notify employee
    if (employeeId) {
      await sb.from('notifications').insert({
        user_id: employeeId,
        type: 'rejected',
        title: 'Timesheet returned',
        message: weekLabel ? `Your timesheet for ${weekLabel} has been returned. Please review and resubmit.` : 'Your timesheet has been returned for revision.'
      });
    }
    return true;
  },
  // Manager: load all team entries + hours summary for a date range
  async teamSummary(fromDate, toDate) {
    const {
      data,
      error
    } = await sb.from('entries').select('user_id, date, hours, project_id, status, profiles(name, initials, role)').gte('date', fromDate).lte('date', toDate).order('date');
    if (error) {
      console.warn('Team summary error:', error.message);
      return [];
    }
    return data || [];
  }
};

const SupaPasswords = {
  async update(userId, newPassword) {
    const {
      error
    } = await sb.from('profiles').update({
      password: newPassword
    }).eq('id', userId);
    if (error) {
      console.warn('Password update error:', error.message);
      return false;
    }
    return true;
  },
  async verify(userId, password) {
    const {
      data,
      error
    } = await sb.from('profiles').select('password').eq('id', userId).single();
    if (error || !data) return false;
    return data.password === password;
  }
};

      ascending: false

    return data || [];
  },
  async markRead(userId) {
    await sb.from('notifications').update({
      read: true
    }).eq('user_id', userId).eq('read', false);
  },
  async markOneRead(id) {
    await sb.from('notifications').update({
      read: true
    }).eq('id', id);
  },
  async create(userId, type, title, message) {
    const {
      error
    } = await sb.from('notifications').insert({
      user_id: userId,
      type,
      title,
      message
    });
    if (error) console.warn('Notification create error:', error.message);
  },
  async getUnreadCount(userId) {
    const {
      count,
      error
    } = await sb.from('notifications').select('*', {
      count: 'exact',
      head: true
    }).eq('user_id', userId).eq('read', false);
    if (error) return 0;
    return count || 0;
  }
};
window.SupaNotifications = SupaNotifications;

  async forDay(userId, date) {
    const {
      data,
      error
    } = await sb.from('app_usage').select('app_key, focus_seconds').eq('user_id', userId).eq('date', date);
    if (error) {
      console.warn('App usage fetch error:', error.message);
      return [];
    }
    // Aggregate by app_key
    const agg = {};
    (data || []).forEach(r => {
      agg[r.app_key] = (agg[r.app_key] || 0) + r.focus_seconds;
    });
    return agg;
  },
  async teamForDay(date) {
    const {
      data,
      error
    } = await sb.from('app_usage').select('user_id, app_key, focus_seconds').eq('date', date);
    if (error) {
      console.warn('Team app usage error:', error.message);
      return [];
    }
    return data || [];
  }
};

      lastTick.current = now;

      const isIdle = sinceAct >= idleThresholdSec;

// -- Date helpers --------------------------------------------------------------
function getWeekDates(offset) {
  offset = offset || 0;
  const d = new Date();
  const day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1) + offset * 7);
  return Array.from({
    length: 5
  }, function (_, i) {
    const x = new Date(d);
    x.setDate(d.getDate() + i);
    return x.toISOString().split('T')[0];
  });
}
function getMonthDates(offset) {
  offset = offset || 0;
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + offset);
  const from = d.toISOString().split('T')[0];
  const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  return {
    from,
    to: last.toISOString().split('T')[0]
  };
}
function fmtDate(iso) {
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', {
    day: 'numeric',
    month: 'short',
    year: 'numeric'
  });
}
function fmtWeekLabel(dates) {
  const s = new Date(dates[0] + 'T00:00:00');
  const e = new Date(dates[4] + 'T00:00:00');
  return s.toLocaleDateString('en-GB', {
    day: 'numeric',
    month: 'long'
  }) + '   ' + e.toLocaleDateString('en-GB', {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });
}

function pdfHeader(doc, PW, title, subtitle, showLogo) {
  // Navy band
  doc.setFillColor(NLA_NAVY[0], NLA_NAVY[1], NLA_NAVY[2]);
  doc.rect(0, 0, PW, 30, 'F');

  // Logo (correct aspect ratio: 45.9mm wide x 10mm tall)
  if (showLogo !== false) {
    try {
      doc.addImage(NLA_LOGO_B64, 'PNG', 8, 10, LOGO_W, LOGO_H);
    } catch (e) {}
  }

  // Title + subtitle at right
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.text(title, PW - 8, 13, {
    align: 'right'
  });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(NLA_GOLD[0], NLA_GOLD[1], NLA_GOLD[2]);
  doc.text(subtitle, PW - 8, 20, {
    align: 'right'
  });
  doc.setTextColor(160, 180, 210);
  doc.text('Nature Landscape Architects', PW - 8, 26, {
    align: 'right'
  });
}
function pdfFooter(doc, PW, PH, pageNum, pageCount) {
  doc.setFillColor(NLA_NAVY[0], NLA_NAVY[1], NLA_NAVY[2]);
  doc.rect(0, PH - 10, PW, 10, 'F');
  doc.setTextColor(160, 180, 210);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(6.5);
  doc.text('Nature Landscape Architects     Confidential     Internal Use Only', 8, PH - 4);
  doc.setTextColor(NLA_GOLD[0], NLA_GOLD[1], NLA_GOLD[2]);
  doc.text('NLA Timesheet', PW / 2, PH - 4, {
    align: 'center'
  });
  doc.setTextColor(160, 180, 210);
  doc.text('Page ' + pageNum + ' of ' + pageCount, PW - 8, PH - 4, {
    align: 'right'
  });
}
function pdfInfoBar(doc, PW, items, yStart) {
  // Light info bar
  doc.setFillColor(NLA_LIGHT[0], NLA_LIGHT[1], NLA_LIGHT[2]);
  doc.rect(0, yStart, PW, 16, 'F');
  items.forEach(function (item, i) {
    const x = 8 + i * (PW - 16) / items.length;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100, 120, 150);
    doc.setFontSize(6.5);
    doc.text(item[0].toUpperCase(), x, yStart + 5);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(NLA_NAVY[0], NLA_NAVY[1], NLA_NAVY[2]);
    doc.setFontSize(8.5);
    doc.text(item[1], x, yStart + 12);
  });
}
